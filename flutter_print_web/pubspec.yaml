name: flutter_print_web
description: Web implementation of the flutter_print plugin.
version: 0.1.0
homepage: https://github.com/llfbandit/flutter_print/tree/main/flutter_print_web

topics:
  - print
  - printing
  - web

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  flutter_web_plugins:
    sdk: flutter

  web: ^1.0.0
  flutter_print_platform_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: FlutterPrintWeb
        fileName: 'flutter_print_web.dart'
