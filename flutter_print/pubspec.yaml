name: flutter_print
description: "A Flutter plugin focusing on print, that's it. PDF, image, widget and other content."
version: 0.3.0
homepage: https://github.com/llfbandit/flutter_print

resolution: workspace

topics:
  - print
  - printing
  - airprint
  - pdf

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_print_platform_interface: ^0.1.0
  flutter_print_web: ^0.1.0
  flutter_print_windows: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.llfbandit.flutter_print
        pluginClass: FlutterPrintPlugin
      ios:
        pluginClass: FlutterPrintPlugin
      linux:
        pluginClass: FlutterPrintPlugin
      macos:
        pluginClass: FlutterPrintPlugin
      web:
        default_package: flutter_print_web
      windows:
        default_package: flutter_print_windows
